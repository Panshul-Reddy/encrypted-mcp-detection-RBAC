roles:
  full:
    rate_limit: 600
    allowed_tools: "*"

  analyst:
    rate_limit: 100
    allowed_tools:
      - "fetch"
      - "exa"
      - "tavily"
      - "memory"

  readonly:
    rate_limit: 30
    allowed_tools:
      - "fetch"

clients:
  by_ip:
    "10.11.0.30": "full"
    "10.11.0.31": "analyst"
    "127.0.0.1":  "full"
  default_role: "readonly"
