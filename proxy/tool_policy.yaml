roles:
  full:
    allowed_methods: "*"
    allowed_tools: "*"
    rate_limit: 1000
  analyst:
    allowed_methods: ["tools/call", "prompts/list"]
    allowed_tools: ["fetch", "filesystem", "exa", "tavily"]
  readonly:
    allowed_methods: ["tools/call"]
    allowed_tools: ["fetch", "exa", "tavily"]
  deny_all:
    allowed_methods: []
    allowed_tools: []

clients:
  by_ip:
    "10.11.0.30": "full"
    "10.11.0.40": "readonly"
    "127.0.0.1": "full"
  by_api_key:
    "testkey123": "full"
  default_role: "readonly"
