roles:
  full:
    allowed_tools:
      - search_repositories
      - get_file_contents
      - search_nodes
      - fetch
      - create_entities
      - update_entities
      - execute_bash
    denied_tools: []
    rate_limit: 0

  readonly:
    allowed_tools:
      - search_repositories
      - get_file_contents
      - search_nodes
      - fetch
    denied_tools:
      - create_entities
      - update_entities
      - execute_bash
    rate_limit: 60

clients:
  by_ip:
    "10.11.0.30": "full"
    "10.11.0.31": "readonly"
    "127.0.0.1":  "full"
  default_role: "readonly"
