# ============================================================================
# MCP Tool-Level Access Control Policy
# ============================================================================
#
# This policy file controls which MCP tools each client can invoke.
# It is loaded by the TLS proxy at startup and enforced at the application
# layer INSIDE the proxy, where TLS has already been terminated.
#
# NOTE: This is a complementary security layer to the ML-based encrypted
# traffic detection performed by the Rust core on the wire. The ML firewall
# operates on encrypted packets WITHOUT decryption. This RBAC engine operates
# within the proxy where payloads are naturally decrypted after TLS termination.
# ============================================================================

# ── Role Definitions ─────────────────────────────────────────────────────────
# Each role specifies which JSON-RPC methods and tool names are permitted.
# Use "*" as a wildcard to allow everything.
# Use "prefix/*" to match all methods starting with a prefix (e.g., "notifications/*").
roles:
  readonly:
    # MCP JSON-RPC methods allowed for read-only clients
    # NOTE: "tools/call" is allowed at the method level; the tool-level
    # filter below (allowed_tools) restricts WHICH tools can be invoked.
    allowed_methods:
      - "initialize"
      - "ping"
      - "tools/list"
      - "tools/call"                 # Allowed at method level; filtered by allowed_tools
      - "resources/list"
      - "resources/read"
      - "prompts/list"
      - "prompts/get"
      - "notifications/*"            # All notification methods (client -> server)
      - "completion/complete"

    # When method is "tools/call", only these tool names are permitted.
    # Write/mutation tools (create_entities, write_file, etc.) are implicitly denied.
    allowed_tools:
      - "list_directory"
      - "read_file"
      - "get_file_info"
      - "list_allowed_directories"
      - "search_repositories"
      - "search"
      - "fetch"
      - "tavily-search"

  full:
    allowed_methods: "*"          # All JSON-RPC methods
    allowed_tools: "*"            # All tool names

# ── Client Identity Mapping ──────────────────────────────────────────────────
# Clients are resolved to roles via two mechanisms (checked in order):
#   1. API key (X-MCP-API-Key HTTP header) — highest priority
#   2. Source IP address — fallback
# If neither matches, the default_role is applied.
clients:
  # Map API keys to roles (checked first)
  by_api_key:
    "full-access-key-001": "full"
    "readonly-key-001": "readonly"

  # Map source IPs to roles (checked if no API key match)
  by_ip:
    "10.11.0.30": "full"          # groq-client (legitimate traffic generator)
    "10.11.0.40": "readonly"      # noise-client (restricted access)
    "127.0.0.1":  "full"          # localhost / native mode

  # Role assigned when no IP or API key matches
  default_role: "readonly"
