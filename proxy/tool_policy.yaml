roles:
  full:
    allowed_methods: "*"
    allowed_tools:
      - fetch
      - search_nodes
      - search_repositories
      - get_file_contents
      - list_directory
      - execute_bash
      - create_entities
      - delete_entities
      - update_entities
      - create_relations
      - delete_relations
    denied_tools: []
    rate_limit: 0

  readonly:
    allowed_methods: "*"
    allowed_tools:
      - fetch
      - search_nodes
      - search_repositories
      - get_file_contents
      - list_directory
    denied_tools:
      - create_entities
      - update_entities
      - execute_bash
    rate_limit: 60

clients:
  by_api_key:
    "full-access-key-001": "full"
    "readonly-key-001": "readonly"
  by_ip:
    "10.11.0.30": "full"
    "10.11.0.31": "readonly"
    "127.0.0.1":  "full"
  default_role: "readonly"
