worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    ssl_certificate     /etc/nginx/ssl/mcp.crt;
    ssl_certificate_key /etc/nginx/ssl/mcp.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Fetch
    server {
        listen 8440 ssl;
        location / {
            proxy_pass http://10.11.0.10:3000;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400;
        }
    }

    # Memory
    server {
        listen 8441 ssl;
        location / {
            proxy_pass http://10.11.0.10:3001;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400;
        }
    }

    # Filesystem
    server {
        listen 8442 ssl;
        location / {
            proxy_pass http://10.11.0.10:3002;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400;
        }
    }

    # GitHub
    server {
        listen 8443 ssl;
        location / {
            proxy_pass http://10.11.0.10:3003;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400;
        }
    }

    # Exa
    server {
        listen 8444 ssl;
        location / {
            proxy_pass http://10.11.0.10:3004;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400;
        }
    }

    # Tavily
    server {
        listen 8445 ssl;
        location / {
            proxy_pass http://10.11.0.10:3005;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400;
        }
    }
}
